version: '3.8'

services:
  db:
    image: postgres:17
    container_name: agende_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agende_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:


# Comando para entrar no banco de dados
# docker exec -it agende_postgres psql -U postgres -d agende_db

